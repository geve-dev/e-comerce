<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/css/styles.css">
    <title>Login</title>
</head>
<body>

    <header class="header">
        <h1 class="logo">E-Commerce</h1>


        <div class="btns">  
            <button onClick="window.location.href='index.html'">Voltar →</button>
        </div>
    </header>
    
    <div class="login">
        <div class="login-header">
            <h2>Login</h2>
            <button onClick="window.location.href='index.html'">X</button>
        </div>

        <div class="login-main">
            <form id="fl">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="password">
            </form>

            <span>Não tem uma conta? <a href="register.html">Registre-se</a></span>
            
            <div class="btn">
                <button id="btnLogin" onclick="login()">Login</button>
            </div>
        </div>  
    </div>

    <script src="src/js/login.js"></script>
</body>
</html>
